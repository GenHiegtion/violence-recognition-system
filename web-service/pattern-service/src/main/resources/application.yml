server:
  port: ${SERVER_PORT:8081}

spring:
  config:
    import: optional:file:${user.dir}/../../.env[.properties]
  application:
    name: pattern-service
  servlet:
    multipart:
      max-file-size: ${PATTERN_MAX_UPLOAD_SIZE:200MB}
      max-request-size: ${PATTERN_MAX_UPLOAD_SIZE:200MB}
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/vrs_pattern?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  upload-dir: ${PATTERN_UPLOAD_DIR:${user.dir}/../../uploads/patterns}
