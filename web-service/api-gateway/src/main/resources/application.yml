server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: pattern-service
          uri: ${PATTERN_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/patterns/**
        - id: pattern-service-uploads
          uri: ${PATTERN_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/uploads/**
        - id: docs-pattern-service
          uri: ${PATTERN_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/docs/pattern/**
          filters:
            - RewritePath=/docs/pattern/?(?<segment>.*), /${segment}
        - id: model-service
          uri: ${MODEL_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/models/**
        - id: docs-model-service
          uri: ${MODEL_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/docs/model/**
          filters:
            - RewritePath=/docs/model/?(?<segment>.*), /${segment}
        - id: recognition-service
          uri: ${RECOGNITION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/recognitions/**
        - id: docs-recognition-service
          uri: ${RECOGNITION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/docs/recognition/**
          filters:
            - RewritePath=/docs/recognition/?(?<segment>.*), /${segment}
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: docs-user-service
          uri: ${USER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/docs/user/**
          filters:
            - RewritePath=/docs/user/?(?<segment>.*), /${segment}
        - id: ai-inference-service
          uri: ${AI_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/api/ai/**,/health/ai

springdoc:
  swagger-ui:
    path: /api-docs
    disable-swagger-default-url: true
    urls:
      - name: Pattern Service
        url: /docs/pattern/v3/api-docs
      - name: Model Service
        url: /docs/model/v3/api-docs
      - name: Recognition Service
        url: /docs/recognition/v3/api-docs
      - name: User Service
        url: /docs/user/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
