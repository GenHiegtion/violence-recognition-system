server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: pattern-service
          uri: ${PATTERN_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/patterns/**
        - id: video-ingestion-service
          uri: ${VIDEO_INGESTION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/ingestion/**
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: ai-inference-service
          uri: ${AI_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/api/ai/**,/health/ai

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
