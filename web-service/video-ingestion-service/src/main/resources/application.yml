server:
  port: ${SERVER_PORT:8082}

spring:
  config:
    import: optional:file:${user.dir}/../../.env[.properties]
  application:
    name: video-ingestion-service
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/vrs_ingestion?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:200MB}
      max-request-size: ${MAX_UPLOAD_SIZE:200MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
