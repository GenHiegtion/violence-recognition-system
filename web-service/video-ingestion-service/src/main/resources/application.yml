server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: video-ingestion-service
  datasource:
    url: ${DB_URL:jdbc:h2:mem:ingestiondb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:200MB}
      max-request-size: ${MAX_UPLOAD_SIZE:200MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
